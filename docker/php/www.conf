; =============================================================================
; proj-base — PHP-FPM Pool Configuration
; =============================================================================

[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

; Process manager
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; Allow Docker env vars to pass through to PHP
clear_env = no

; Logging
catch_workers_output = yes
decorate_workers_output = no

; Ping/status for health checks
ping.path = /fpm-ping
pm.status_path = /fpm-status
