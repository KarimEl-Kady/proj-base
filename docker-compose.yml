# =============================================================================
# proj-base — Docker Compose
# Laravel 13 HMVC | PHP 8.3-FPM | Nginx | MySQL 8.4 | Redis 7
# =============================================================================
#
# Quick start:
#   cp .env.example .env   (adjust DB/Redis settings)
#   make up                (or: docker compose up -d)
#   make setup             (runs migrations + npm build)
#
# Development with Vite HMR:
#   make dev               (starts all services including Vite)
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # App — PHP-FPM (Laravel)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base          # Use base stage for dev (no compiled assets, bind mount)
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        INSTALL_XDEBUG: ${INSTALL_XDEBUG:-false}
    container_name: proj-base-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html:delegated
      - vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/zz-www.conf:ro
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    environment:
      APP_NAME: ${APP_NAME:-BaseProject}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-proj_base}
      DB_USERNAME: ${DB_USERNAME:-proj_base}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-${APP_NAME:-BaseProject}}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      # Project-specific
      PROJECT_NAME: ${PROJECT_NAME:-${APP_NAME:-BaseProject}}
      PROJECT_VERSION: ${PROJECT_VERSION:-1.0.0}
      PROJECT_DB_DRIVER: ${PROJECT_DB_DRIVER:-mysql}
      PROJECT_TENANCY_MODE: ${PROJECT_TENANCY_MODE:-single}
      PROJECT_TENANT_COLUMN: ${PROJECT_TENANT_COLUMN:-tenant_id}
      PROJECT_TENANT_IDENTIFICATION: ${PROJECT_TENANT_IDENTIFICATION:-subdomain}
      PROJECT_PLATFORM: ${PROJECT_PLATFORM:-web}
      PROJECT_API_ENABLED: ${PROJECT_API_ENABLED:-true}
      PROJECT_API_PREFIX: ${PROJECT_API_PREFIX:-api}
      PROJECT_API_VERSION: ${PROJECT_API_VERSION:-v1}
      PROJECT_API_RATE_LIMIT: ${PROJECT_API_RATE_LIMIT:-60}
      PROJECT_ROUTE_ATTRIBUTES: ${PROJECT_ROUTE_ATTRIBUTES:-true}
      PROJECT_AUTH_DRIVER: ${PROJECT_AUTH_DRIVER:-session}
      PROJECT_FEATURE_REGISTRATION: ${PROJECT_FEATURE_REGISTRATION:-true}
      PROJECT_FEATURE_EMAIL_VERIFICATION: ${PROJECT_FEATURE_EMAIL_VERIFICATION:-false}
      PROJECT_FEATURE_2FA: ${PROJECT_FEATURE_2FA:-false}
      PROJECT_FEATURE_API_TOKENS: ${PROJECT_FEATURE_API_TOKENS:-false}
      PROJECT_CACHE_PREFIX: ${PROJECT_CACHE_PREFIX:-proj_base_}
      PROJECT_PAGINATION_PER_PAGE: ${PROJECT_PAGINATION_PER_PAGE:-15}
      PROJECT_PAGINATION_MAX_PER_PAGE: ${PROJECT_PAGINATION_MAX_PER_PAGE:-100}
      MEDIA_DISK: ${MEDIA_DISK:-public}
      MEDIA_DIRECTORY: ${MEDIA_DIRECTORY:-media}
      MEDIA_MAX_FILE_SIZE: ${MEDIA_MAX_FILE_SIZE:-10240}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proj-base
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Nginx — Web Server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: proj-base-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - proj-base
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # MySQL 8.4
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: proj-base-mysql
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-proj_base}
      MYSQL_USER: ${DB_USERNAME:-proj_base}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - proj-base
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 (uncomment to use instead of / alongside MySQL)
  # ---------------------------------------------------------------------------
  # pgsql:
  #   image: postgres:17-alpine
  #   container_name: proj-base-pgsql
  #   restart: unless-stopped
  #   ports:
  #     - "${FORWARD_DB_PORT:-5432}:5432"
  #   environment:
  #     POSTGRES_DB: ${DB_DATABASE:-proj_base}
  #     POSTGRES_USER: ${DB_USERNAME:-proj_base}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
  #   volumes:
  #     - pgsql_data:/var/lib/postgresql/data
  #   networks:
  #     - proj-base
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-proj_base}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 15s

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: proj-base-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - proj-base
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

  # ---------------------------------------------------------------------------
  # Queue Worker
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: proj-base-queue
    restart: unless-stopped
    volumes:
      - .:/var/www/html:delegated
      - vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    environment:
      APP_NAME: ${APP_NAME:-BaseProject}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-proj_base}
      DB_USERNAME: ${DB_USERNAME:-proj_base}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      PROJECT_DB_DRIVER: ${PROJECT_DB_DRIVER:-mysql}
      PROJECT_ROUTE_ATTRIBUTES: ${PROJECT_ROUTE_ATTRIBUTES:-true}
    entrypoint: ["entrypoint.sh"]
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90", "--max-jobs=1000", "--max-time=3600"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proj-base

  # ---------------------------------------------------------------------------
  # Scheduler (cron)
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: proj-base-scheduler
    restart: unless-stopped
    volumes:
      - .:/var/www/html:delegated
      - vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    environment:
      APP_NAME: ${APP_NAME:-BaseProject}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-proj_base}
      DB_USERNAME: ${DB_USERNAME:-proj_base}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      PROJECT_DB_DRIVER: ${PROJECT_DB_DRIVER:-mysql}
      PROJECT_ROUTE_ATTRIBUTES: ${PROJECT_ROUTE_ATTRIBUTES:-true}
    entrypoint: ["entrypoint.sh"]
    command: ["/bin/sh", "-c", "echo '* * * * * cd /var/www/html && php artisan schedule:run >> /dev/null 2>&1' | crontab - && crond -f -l 2"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proj-base

  # ---------------------------------------------------------------------------
  # Vite Dev Server (development only — HMR)
  # ---------------------------------------------------------------------------
  vite:
    image: node:22-alpine
    container_name: proj-base-vite
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www/html:delegated
      - node_modules:/var/www/html/node_modules
    command: ["/bin/sh", "-c", "npm ci --ignore-scripts && npm run dev -- --host 0.0.0.0"]
    networks:
      - proj-base
    profiles:
      - dev

  # ---------------------------------------------------------------------------
  # Mailpit — Local email testing (dev profile)
  # Web UI: http://localhost:8025  |  SMTP: mailpit:1025
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: proj-base-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - proj-base
    profiles:
      - dev

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mysql_data:
    driver: local
  # pgsql_data:
  #   driver: local
  redis_data:
    driver: local
  vendor:
    driver: local
  node_modules:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  proj-base:
    driver: bridge
