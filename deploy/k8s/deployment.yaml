apiVersion: apps/v1
kind: Deployment
metadata:
  name: proj-base-app
  labels:
    app.kubernetes.io/name: proj-base
    app.kubernetes.io/component: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proj-base
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proj-base
        app.kubernetes.io/component: web
    spec:
      # Run `migrate-job.yaml` to completion against the new image tag
      # before rolling this out — maxUnavailable: 0 above keeps old pods
      # serving traffic during the rollout, but won't wait for migrations
      # for you.
      initContainers:
        - name: public-assets
          image: ghcr.io/ORG/proj-base:TAG
          command: ["sh", "-c", "cp -r /var/www/html/public/. /shared-public/"]
          volumeMounts:
            - name: public-assets
              mountPath: /shared-public
      containers:
        - name: app
          image: ghcr.io/ORG/proj-base:TAG
          ports:
            - containerPort: 9000
              name: fpm
          envFrom:
            - secretRef:
                name: proj-base-env
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: public-assets
              mountPath: /var/www/html/public
              readOnly: true
          # Cheap, non-PHP check — restart the pod only if nginx itself is
          # wedged, not because the database is briefly slow.
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          # Hits the app's real health check (DB/Cache/Redis/Queue,
          # HealthController) through the full fastcgi path — a pod only
          # receives traffic once the whole stack is actually up.
          readinessProbe:
            httpGet:
              path: /api/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi

      volumes:
        - name: nginx-conf
          configMap:
            name: proj-base-nginx
        - name: public-assets
          emptyDir: {}
