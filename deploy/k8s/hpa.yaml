apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proj-base-app
  labels:
    app.kubernetes.io/name: proj-base
    app.kubernetes.io/component: web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proj-base-app
  # Starting points, not tuned values — watch real load (the app container's
  # CPU under your actual traffic) before trusting these numbers.
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
