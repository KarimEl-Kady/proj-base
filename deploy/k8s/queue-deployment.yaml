apiVersion: apps/v1
kind: Deployment
metadata:
  name: proj-base-queue-default
  labels: &labels
    app.kubernetes.io/name: proj-base
    app.kubernetes.io/component: queue
    app.kubernetes.io/queue: default
spec:
  replicas: 2
  strategy: &strategy
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: *labels
  template:
    metadata:
      labels: *labels
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: queue
          image: ghcr.io/ORG/proj-base:TAG
          command: &command
            - php
            - artisan
            - queue:work
            - --queue=default
            - --sleep=3
            - --tries=3
            - --timeout=90
            - --max-jobs=1000
            - --max-time=3600
          envFrom: &env
            - secretRef:
                name: proj-base-env
          resources: &resources
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
