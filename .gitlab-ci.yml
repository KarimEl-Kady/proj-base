# =============================================================================
# GitLab CI/CD — mirrors .github/workflows/ci.yml
#
# Stages: syntax → lint+test → build → deploy
#
# Dev deploy runs on pushes to `develop` and needs these CI/CD variables
# (Settings → CI/CD → Variables; mark the key as Protected + Masked):
#
#   DEV_SSH_PRIVATE_KEY   (required, type: Variable) private key whose public
#                         half is in the dev server's ~/.ssh/authorized_keys
#   DEV_SSH_HOST          (required) dev server hostname or IP
#   DEV_SSH_USER          (required) SSH user, e.g. deploy
#   DEV_SSH_PORT          (optional) SSH port, defaults to 22
#   DEV_DEPLOY_PATH       (optional) project path on the server, defaults to
#                         the value in deploy/deploy-dev.sh
#   DEV_SSH_KNOWN_HOSTS   (optional) pinned host key (`ssh-keyscan` output)
# =============================================================================

stages:
  - syntax
  - test
  - build
  - deploy

variables:
  COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer-cache"
  PHP_VERSION: "8.3"

.php-base:
  image: "php:${PHP_VERSION}-cli"
  before_script:
    - apt-get update -qq && apt-get install -qq -y git unzip > /dev/null
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist --no-progress
  cache:
    key:
      prefix: "composer-${PHP_VERSION}"
      files:
        - composer.lock
    paths:
      - .composer-cache/
      - vendor/

# -----------------------------------------------------------------------------
# Syntax — fast fail on parse errors
# -----------------------------------------------------------------------------
php-syntax:
  stage: syntax
  image: composer:2
  script:
    - find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null
    - echo "No syntax errors detected."
    - composer validate --no-check-publish

# -----------------------------------------------------------------------------
# Lint + Test
# -----------------------------------------------------------------------------
php-test:
  stage: test
  extends: .php-base
  parallel:
    matrix:
      - PHP_VERSION: ["8.3", "8.4"]
  services:
    - name: redis:7-alpine
      alias: redis
  script:
    - cp .env.example .env
    - php artisan key:generate
    - ./vendor/bin/pint --test
    - ./vendor/bin/phpstan analyse --memory-limit=1G --no-progress
    - php artisan project:validate
    - php artisan config:clear --ansi
    - php artisan route:list > /dev/null   # boot smoke check
    - php artisan route:cache && php artisan route:clear
    - php artisan module:boundaries
    - php artisan test
    - apt-get install -qq -y autoconf g++ make > /dev/null
    - pecl install redis > /dev/null && docker-php-ext-enable redis
    - RUN_REDIS_INTEGRATION=true CACHE_STORE=redis QUEUE_CONNECTION=redis REDIS_HOST=redis php artisan test --filter=RedisQueueIntegrationTest
  variables:
    DB_CONNECTION: sqlite
    DB_DATABASE: ":memory:"
    CACHE_STORE: array
    SESSION_DRIVER: array
    QUEUE_CONNECTION: sync
    MAIL_MAILER: array

# Tests run on SQLite; this guards schema portability on the real driver
# (FK ordering, column types) in every tenancy mode.
mysql-migrations:
  stage: test
  extends: .php-base
  services:
    - name: mysql:8.4
      alias: mysql
  script:
    - cp .env.example .env
    - php artisan key:generate
    - apt-get install -qq -y libonig-dev > /dev/null && docker-php-ext-install pdo_mysql > /dev/null
    - until php -r 'new PDO("mysql:host=mysql;port=3306", "root", "rootsecret");' 2>/dev/null; do sleep 2; done
    - PROJECT_TENANCY_MODE=none  php artisan migrate:fresh --force
    - PROJECT_TENANCY_MODE=multi php artisan migrate:fresh --force
  variables:
    MYSQL_ROOT_PASSWORD: rootsecret
    MYSQL_DATABASE: proj_base_test
    DB_CONNECTION: mysql
    DB_HOST: mysql
    DB_PORT: "3306"
    DB_DATABASE: proj_base_test
    DB_USERNAME: root
    DB_PASSWORD: rootsecret
    CACHE_STORE: array
    SESSION_DRIVER: array

pgsql-migrations:
  stage: test
  extends: .php-base
  services:
    - name: postgres:17-alpine
      alias: pgsql
  script:
    - cp .env.example .env
    - php artisan key:generate
    - apt-get install -qq -y libpq-dev > /dev/null && docker-php-ext-install pdo_pgsql > /dev/null
    - until php -r 'new PDO("pgsql:host=pgsql;port=5432;dbname=proj_base_test", "proj_base", "secret");' 2>/dev/null; do sleep 2; done
    - PROJECT_TENANCY_MODE=none  php artisan migrate:fresh --force
    - PROJECT_TENANCY_MODE=multi php artisan migrate:fresh --force
  variables:
    POSTGRES_DB: proj_base_test
    POSTGRES_USER: proj_base
    POSTGRES_PASSWORD: secret
    DB_CONNECTION: pgsql
    DB_HOST: pgsql
    DB_PORT: "5432"
    DB_DATABASE: proj_base_test
    DB_USERNAME: proj_base
    DB_PASSWORD: secret
    CACHE_STORE: array
    SESSION_DRIVER: array
    QUEUE_CONNECTION: sync

composer-audit:
  stage: test
  extends: .php-base
  script:
    - composer audit --format=plain

# -----------------------------------------------------------------------------
# Frontend build
# -----------------------------------------------------------------------------
frontend-build:
  stage: build
  image: node:22-alpine
  script:
    - npm ci --ignore-scripts
    - npm run build
    - npm audit --audit-level=high
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

container-build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build --tag proj-base:ci .
    - docker run --rm --entrypoint php proj-base:ci artisan about --only=environment
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        docker tag proj-base:ci "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      fi

# -----------------------------------------------------------------------------
# Deploy → Dev Server (SSH)
# Remote steps live in deploy/deploy-dev.sh — customize there.
# -----------------------------------------------------------------------------
deploy-dev:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  environment:
    name: dev
  before_script:
    - apk add --no-cache openssh-client bash
    - |
      if [ -z "$DEV_SSH_HOST" ] || [ -z "$DEV_SSH_USER" ] || [ -z "$DEV_SSH_PRIVATE_KEY" ]; then
        echo "Dev deploy skipped — configure DEV_SSH_HOST, DEV_SSH_USER and DEV_SSH_PRIVATE_KEY CI/CD variables."
        exit 0
      fi
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - printf '%s\n' "$DEV_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - |
      if [ -n "$DEV_SSH_KNOWN_HOSTS" ]; then
        printf '%s\n' "$DEV_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
      else
        ssh-keyscan -p "${DEV_SSH_PORT:-22}" "$DEV_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      fi
  script:
    - |
      if [ -z "$DEV_SSH_HOST" ]; then exit 0; fi
      ssh -i ~/.ssh/deploy_key -p "${DEV_SSH_PORT:-22}" "$DEV_SSH_USER@$DEV_SSH_HOST" \
        "DEPLOY_PATH='$DEV_DEPLOY_PATH' GIT_BRANCH='$CI_COMMIT_BRANCH' bash -s" \
        < deploy/deploy-dev.sh
  after_script:
    - rm -f ~/.ssh/deploy_key
