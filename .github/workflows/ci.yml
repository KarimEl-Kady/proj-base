name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Syntax — fast fail on parse errors (no dependencies needed)
  # ---------------------------------------------------------------------------
  syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Lint PHP files
        run: |
          find app config database routes tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
          echo "No syntax errors detected."

      - name: Validate composer.json
        run: composer validate --no-check-publish

  # ---------------------------------------------------------------------------
  # PHP — Lint + Test
  # ---------------------------------------------------------------------------
  php:
    name: PHP ${{ matrix.php }} — Tests
    needs: syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        php: ['8.3', '8.4']

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootsecret
          MYSQL_DATABASE: proj_base_test
          MYSQL_USER: proj_base
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootsecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, pdo_pgsql, redis, bcmath, gd, intl, zip, opcache, pcntl, mbstring
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      # -----------------------------------------------------------------------
      # Lint
      # -----------------------------------------------------------------------
      - name: PHP Pint (lint)
        run: ./vendor/bin/pint --test

      # -----------------------------------------------------------------------
      # Test
      # -----------------------------------------------------------------------
      - name: Boot smoke check (catches urgent runtime errors)
        run: |
          php artisan config:clear --ansi
          php artisan route:list > /dev/null
          php artisan route:cache && php artisan route:clear   # guard: routes must stay cacheable
          php artisan module:boundaries                        # guard: no undeclared cross-module deps
          php artisan about
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      # Tests run on SQLite; this guards schema portability on the real
      # driver (FK ordering, column types) in every tenancy mode.
      - name: Migrations run on MySQL (schema portability guard)
        run: |
          PROJECT_TENANCY_MODE=none  php artisan migrate:fresh --force
          PROJECT_TENANCY_MODE=multi php artisan migrate:fresh --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: proj_base_test
          DB_USERNAME: root
          DB_PASSWORD: rootsecret

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array

  # ---------------------------------------------------------------------------
  # Frontend — Build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build assets
        run: npm run build

  # ---------------------------------------------------------------------------
  # Security — Composer audit
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer audit
        run: composer audit --format=plain

  # ---------------------------------------------------------------------------
  # Deploy → Dev Server (SSH)
  #
  # Runs after all checks pass, on pushes to `develop` (or manual dispatch).
  # The remote steps live in deploy/deploy-dev.sh — customize paths/behaviour
  # there. Connection settings come from GitHub repo secrets
  # (Settings → Secrets and variables → Actions):
  #
  #   DEV_SSH_PRIVATE_KEY   (required) private key whose public half is in the
  #                         dev server's ~/.ssh/authorized_keys
  #   DEV_SSH_HOST          (required) dev server hostname or IP
  #   DEV_SSH_USER          (required) SSH user, e.g. deploy
  #   DEV_SSH_PORT          (optional) SSH port, defaults to 22
  #   DEV_DEPLOY_PATH       (optional) project path on the server,
  #                         defaults to the value in deploy/deploy-dev.sh
  #   DEV_SSH_KNOWN_HOSTS   (optional) pinned host key (output of
  #                         `ssh-keyscan -p <port> <host>`); if unset the host
  #                         key is accepted on first connection
  #
  # If DEV_SSH_HOST is not configured the job exits successfully with a notice,
  # so CI stays green until you wire up the server.
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy → Dev Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [php, frontend, security]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
    environment: dev

    env:
      DEPLOY_HOST: ${{ secrets.DEV_SSH_HOST }}
      DEPLOY_USER: ${{ secrets.DEV_SSH_USER }}
      DEPLOY_PORT: ${{ secrets.DEV_SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy configuration
        id: config
        env:
          SSH_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$SSH_KEY" ]; then
            echo "::notice::Dev deploy skipped — configure DEV_SSH_HOST, DEV_SSH_USER and DEV_SSH_PRIVATE_KEY secrets to enable it."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH key
        if: steps.config.outputs.configured == 'true'
        env:
          SSH_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEV_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "$KNOWN_HOSTS" ]; then
            printf '%s\n' "$KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi

      - name: Deploy
        if: steps.config.outputs.configured == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' GIT_BRANCH='${GITHUB_REF_NAME}' bash -s" \
            < deploy/deploy-dev.sh

      - name: Cleanup SSH key
        if: always() && steps.config.outputs.configured == 'true'
        run: rm -f ~/.ssh/deploy_key
